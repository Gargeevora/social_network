{% extends 'base.html' %}

{% block title %}Resend Verification - Social Network{% endblock %}

{% block content %}

<div class="form-container" style="max-width:500px;">

    <div class="announce-header">
        <div class="announce-icon">
            <i class="fas fa-envelope"></i>
        </div>
        <div>
            <h2>Resend Verification Email</h2>
            <p class="subtitle">Enter your email to receive a new verification link</p>
        </div>
    </div>

    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="Enter your registered email" required>
        </div>
        <button type="submit" class="btn-primary">
            <i class="fas fa-paper-plane"></i> Send Verification Email
        </button>
    </form>

    <div class="form-footer">
        <p>Already verified? <a href="{% url 'accounts:login' %}">Login here</a></p>
    </div>

</div>

{% endblock %}
